<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blox Fruits Calculator Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Warna Tema Modern */
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.4);
            
            /* Warna Rarity */
            --mythical-top: #ef4444; --mythical-mid: rgba(220, 38, 38, 0.5); --mythical-bot: #450a0a;
            --legendary-top: #d946ef; --legendary-mid: rgba(192, 38, 211, 0.5); --legendary-bot: #4a044e;
            --rare-top: #3b82f6; --rare-mid: rgba(37, 99, 235, 0.5); --rare-bot: #172554;
            --uncommon-top: #06b6d4; --uncommon-mid: rgba(8, 145, 178, 0.5); --uncommon-bot: #083344;
            --common-top: #94a3b8; --common-mid: rgba(100, 116, 139, 0.5); --common-bot: #0f172a;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .calculator-container {
            width: 950px; max-width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .main-layout { 
            display: flex; justify-content: center; align-items: flex-start; gap: 3%; 
            width: 100%;
        }

        #side-you { order: 1; }
        .center-area { order: 2; }
        #side-them { order: 3; }

        .side { 
            width: 32%; text-align: center; 
            background-color: var(--panel-bg);
            padding: 15px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box; 
        }
        .side h2 { 
            margin: 0 0 15px 0; font-size: 20px; color: #fff; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 8px;
        }
        #side-you h2 { border-color: #3b82f6; color: #60a5fa; }
        #side-them h2 { border-color: #ef4444; color: #f87171; }

        .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .slot {
            width: 100%; height: 140px; 
            border-radius: 10px;
            display: flex; flex-direction: column; 
            justify-content: space-between; align-items: center;
            position: relative; overflow: hidden;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        
        .slot-empty { 
            background-color: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.15); 
            cursor: pointer; justify-content: center;
        }
        .slot-empty:hover { border-color: var(--accent); background-color: rgba(245, 158, 11, 0.1); transform: translateY(-2px); }
        .slot-plus { font-size: 40px; color: rgba(255,255,255,0.2); font-weight: 600; }

        .slot-filled { 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); 
        }
        .slot-filled:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); border-color: #ef4444; }
        .slot-disabled { background-color: rgba(0,0,0,0.2); border: 2px dashed rgba(255,255,255,0.05); cursor: not-allowed; } 

        .card-header {
            flex-shrink: 0;
            color: white; font-size: 11px; font-weight: 800; text-align: center; padding: 4px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); border-bottom: 1px solid rgba(0,0,0,0.3); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
            letter-spacing: 0.5px; box-sizing: border-box;
        }
        
        .card-body {
            position: relative; flex: 1; width: 100%;
            min-height: 0; 
            display: flex; justify-content: center; align-items: center; padding: 5px; box-sizing: border-box;
        }
        .fruit-img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8)); transition: 0.2s; }
        .slot-filled:hover .fruit-img { transform: scale(1.1); }
        
        .card-footer { 
            flex-shrink: 0; 
            width: 100%; text-align: center; padding: 4px; border-top: 1px solid rgba(0,0,0,0.5); 
            font-size: 12px; font-weight: 800; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        /* =========================================
           REVISI: ANIMASI SEKEJAP (Sangat Cepat)
           ========================================= */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.7); }
            80% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* Dipercepat dari 0.3s menjadi 0.12s */
        .animate-pop-in { animation: popIn 0.12s ease-out forwards; }

        @keyframes popOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.6); }
        }
        /* Dipercepat dari 0.15s menjadi 0.08s */
        .animate-pop-out { animation: popOut 0.08s ease-in forwards; pointer-events: none; }


        /* BAGIAN TENGAH (INFORMASI) */
        .center-area { 
            width: 30%; text-align: center; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding-top: 20px; box-sizing: border-box;
        }
        
        .reset-btn { 
            background-color: rgba(239, 68, 68, 0.1); color: #ef4444; 
            border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 12px;
            padding: 10px 20px; font-weight: 800; font-size: 13px; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 30px; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }
        .reset-btn:hover { background-color: #ef4444; color: white; transform: translateY(-2px); }
        .reset-btn:active { transform: scale(0.95); }
        
        .diff-label { color: var(--text-muted); font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;}
        .diff-percent { 
            font-size: 70px; font-weight: 900; margin: -5px 0 0px 0; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.4); line-height: 1.1;
        }
        .status-text { font-size: 16px; font-weight: 800; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px;}
        
        .missing-info { 
            background-color: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); 
            color: #fca5a5; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; 
            margin-top: 15px; display: none; width: 100%; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.1);
        }
        .missing-info span { color: #fff; font-size: 18px; font-weight: 900; letter-spacing: 1px; display: block; margin-top: 4px;} 

        /* Tampilan Total Harga */
        .totals-box { margin-top: 15px; width: 100%;}
        .total-row { 
            background-color: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 15px; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 800; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); display: flex; justify-content: space-between;
        }

        /* MODAL POP UP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; transition: opacity 0.15s ease-in-out; /* Animasi modal dipercepat */
        }
        .modal-overlay.show { opacity: 1; } 

        .modal-content {
            background-color: var(--panel-bg); 
            width: 90%; max-width: 850px; height: 85%; border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: scale(0.95) translateY(10px); transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.show .modal-content { transform: scale(1) translateY(0); } 

        .modal-header { 
            padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-between; align-items: center; 
            background-color: rgba(0,0,0,0.2); border-radius: 16px 16px 0 0;
        }
        .modal-header h3 { margin: 0; color: var(--accent); font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;}
        
        .modal-close { 
            cursor: pointer; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: none; 
            width: 32px; height: 32px; border-radius: 50%; font-weight: bold; font-size: 16px; 
            display: flex; justify-content: center; align-items: center; transition: 0.2s;
        }
        .modal-close:hover { background-color: #ef4444; color: white; transform: rotate(90deg); }
        
        .modal-body { 
            padding: 15px; overflow-y: auto; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; align-items: start; 
        }

        /* WARNA BACKGROUND KARTU */
        .mythical-bg .card-header { background-color: var(--mythical-top); }
        .mythical-bg .card-body { background: linear-gradient(to bottom, var(--mythical-mid), transparent), url('assets/Fruit-BG.png'); background-size: cover; }
        .mythical-bg .card-footer { background-color: var(--mythical-bot); }

        .legendary-bg .card-header { background-color: var(--legendary-top); }
        .legendary-bg .card-body { background: linear-gradient(to bottom, var(--legendary-mid), transparent), url('assets/Fruit-BG.png'); background-size: cover; }
        .legendary-bg .card-footer { background-color: var(--legendary-bot); }

        .rare-bg .card-header { background-color: var(--rare-top); }
        .rare-bg .card-body { background: linear-gradient(to bottom, var(--rare-mid), transparent), url('assets/Fruit-BG.png'); background-size: cover; }
        .rare-bg .card-footer { background-color: var(--rare-bot); }

        .uncommon-bg .card-header { background-color: var(--uncommon-top); }
        .uncommon-bg .card-body { background: linear-gradient(to bottom, var(--uncommon-mid), transparent), url('assets/Fruit-BG.png'); background-size: cover; }
        .uncommon-bg .card-footer { background-color: var(--uncommon-bot); }

        .common-bg .card-header { background-color: var(--common-top); }
        .common-bg .card-body { background: linear-gradient(to bottom, var(--common-mid), transparent), url('assets/Fruit-BG.png'); background-size: cover; }
        .common-bg .card-footer { background-color: var(--common-bot); }

        .text-green { color: #10b981 !important; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .text-red { color: #ef4444 !important; text-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* KHUSUS HP */
        @media screen and (max-width: 768px) {
            body { height: auto; min-height: 100vh; overflow-y: auto; padding: 10px 0 30px 0; }
            .calculator-container { padding: 10px; height: auto; display: flex; flex-direction: column; }
            .main-layout { display: flex; flex-wrap: wrap; gap: 15px 10px; width: 100%; justify-content: space-between; }
            
            #side-you { order: 1; }
            #side-them { order: 2; }
            .center-area { order: 3; width: 100%; margin-top: 10px; }
            
            .side { width: calc(50% - 5px); padding: 10px; border-radius: 12px; } 
            .side h2 { font-size: 14px; margin: 0 0 10px 0; padding-bottom: 5px; }
            
            .slot-grid { gap: 6px; }
            .slot { height: 90px; border-radius: 8px;}
            .slot-plus { font-size: 28px; }
            
            .card-header { font-size: 8px; padding: 3px 0; }
            .card-footer { font-size: 9px; padding: 3px; }
            .card-body { padding: 4px; }
            
            .totals-box { margin-top: 10px; }
            .total-row { font-size: 10px; padding: 6px 8px; flex-direction: column; text-align: center; gap: 2px;}
            
            .center-area { padding: 0; }
            .reset-btn { padding: 10px 0; width: 160px; font-size: 13px; margin: 0 auto 20px auto; }
            
            .diff-label { font-size: 13px; margin-bottom: 0px; } 
            .diff-percent { font-size: 65px; margin-top: -5px;}
            .status-text { font-size: 14px; margin-top: 0; }
            .missing-info { padding: 10px; font-size: 11px; margin-top: 5px; width: 90%; border-radius: 8px;}
            .missing-info span { font-size: 15px; margin-top: 2px;}
            
            .modal-content { height: 92vh; width: 95vw; border-radius: 12px;}
            .modal-header { padding: 12px 16px; border-radius: 12px 12px 0 0;}
            .modal-header h3 { font-size: 14px; }
            .modal-body { grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; padding: 10px; }
            .modal-body .slot { height: 105px; }
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <div class="main-layout">
            <div class="side" id="side-you">
                <h2>You</h2>
                <div class="slot-grid" id="you-grid"></div>
                <div class="totals-box">
                    <div class="total-row" id="you-total-price"></div>
                </div>
            </div>

            <div class="center-area">
                <button class="reset-btn" onclick="resetAll()">
                    <span>🔄</span> Reset All
                </button>
                <div class="diff-label">Price Difference</div>
                <div class="diff-percent" id="ui-percent">0%</div>
                <div class="status-text text-green" id="ui-status"></div>
                <div class="missing-info" id="ui-missing-info"></div>
            </div>

            <div class="side" id="side-them">
                <h2>Them</h2>
                <div class="slot-grid" id="them-grid"></div>
                <div class="totals-box">
                    <div class="total-row" id="them-total-price"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal" onclick="closeModalOnOutsideClick(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Pilih Buah</h3>
                <button class="modal-close" onclick="closeModal()">✖</button>
            </div>
            <div class="modal-body" id="fruit-list-modal"></div>
        </div>
    </div>

    <script>
        // REVISI: Skin dihapus dari daftar buah
        const fruitData = [
            { id: 'dragon', name: "Dragon", price: 15000000, img: "assets/Dragon.png", rarity: 'Mythical' },
            { id: 'control', name: "Control", price: 9000000, img: "assets/Control.png", rarity: 'Mythical' },
            { id: 'kitsune', name: "Kitsune", price: 8000000, img: "assets/Kitsune.png", rarity: 'Mythical' },
            { id: 'tiger', name: "Tiger", price: 5000000, img: "assets/Tiger.png", rarity: 'Mythical' }, 
            { id: 'yeti', name: "Yeti", price: 5000000, img: "assets/Yeti.png", rarity: 'Mythical' }, 
            { id: 'spirit', name: "Spirit", price: 3400000, img: "assets/Spirit.png", rarity: 'Mythical' }, 
            { id: 'gas', name: "Gas", price: 3200000, img: "assets/Gas.png", rarity: 'Mythical' }, 
            { id: 'venom', name: "Venom", price: 3000000, img: "assets/Venom.png", rarity: 'Mythical' },
            { id: 'shadow', name: "Shadow", price: 2900000, img: "assets/Shadow.png", rarity: 'Mythical' },
            { id: 'dough', name: "Dough", price: 2800000, img: "assets/Dough.png", rarity: 'Mythical' },
            { id: 'trex', name: "T-Rex", price: 2700000, img: "assets/T-Rex.png", rarity: 'Mythical' }, 
            { id: 'mammoth', name: "Mammoth", price: 2700000, img: "assets/Mammoth.png", rarity: 'Mythical' }, 
            { id: 'gravity', name: "Gravity", price: 2500000, img: "assets/Gravity.png", rarity: 'Mythical' },

            { id: 'blizzard', name: "Blizzard", price: 2400000, img: "assets/Blizzard.png", rarity: 'Legendary' },
            { id: 'pain', name: "Pain", price: 2300000, img: "assets/Pain.png", rarity: 'Legendary' }, 
            { id: 'rumble', name: "Rumble", price: 2100000, img: "assets/Rumble.png", rarity: 'Legendary' },
            { id: 'portal', name: "Portal", price: 1900000, img: "assets/Portal.png", rarity: 'Legendary' }, 
            { id: 'phoenix', name: "Phoenix", price: 1800000, img: "assets/Phoenix.png", rarity: 'Legendary' },
            { id: 'sound', name: "Sound", price: 1700000, img: "assets/Sound.png", rarity: 'Legendary' }, 
            { id: 'spider', name: "Spider", price: 1500000, img: "assets/Spider.png", rarity: 'Legendary' }, 
            { id: 'creation', name: "Creation", price: 1400000, img: "assets/Creation.png", rarity: 'Legendary' }, 
            { id: 'love', name: "Love", price: 1300000, img: "assets/Love.png", rarity: 'Legendary' },
            { id: 'buddha', name: "Buddha", price: 1200000, img: "assets/Buddha.png", rarity: 'Legendary' },
            { id: 'quake', name: "Quake", price: 1000000, img: "assets/Quake.png", rarity: 'Legendary' },

            { id: 'magma', name: "Magma", price: 960000, img: "assets/Magma.png", rarity: 'Rare' },
            { id: 'ghost', name: "Ghost", price: 940000, img: "assets/Ghost.png", rarity: 'Rare' }, 
            { id: 'rubber', name: "Rubber", price: 750000, img: "assets/Rubber.png", rarity: 'Rare' },
            { id: 'light', name: "Light", price: 650000, img: "assets/Light.png", rarity: 'Rare' },

            { id: 'diamond', name: "Diamond", price: 600000, img: "assets/Diamond.png", rarity: 'Uncommon' },
            { id: 'eagle', name: "Eagle", price: 550000, img: "assets/Eagle.png", rarity: 'Uncommon' }, 
            { id: 'dark', name: "Dark", price: 500000, img: "assets/Dark.png", rarity: 'Uncommon' },
            { id: 'sand', name: "Sand", price: 420000, img: "assets/Sand.png", rarity: 'Uncommon' },
            { id: 'ice', name: "Ice", price: 350000, img: "assets/Ice.png", rarity: 'Uncommon' },
            { id: 'flame', name: "Flame", price: 250000, img: "assets/Flame.png", rarity: 'Uncommon' },

            { id: 'spike', name: "Spike", price: 180000, img: "assets/Spike.png", rarity: 'Common' },
            { id: 'smoke', name: "Smoke", price: 100000, img: "assets/Smoke.png", rarity: 'Common' },
            { id: 'bomb', name: "Bomb", price: 80000, img: "assets/Bomb.png", rarity: 'Common' },
            { id: 'spring', name: "Spring", price: 60000, img: "assets/Spring.png", rarity: 'Common' },
            { id: 'blade', name: "Blade", price: 30000, img: "assets/Blade.png", rarity: 'Common' }, 
            { id: 'spin', name: "Spin", price: 7500, img: "assets/Spin.png", rarity: 'Common' },
            { id: 'rocket', name: "Rocket", price: 5000, img: "assets/Rocket.png", rarity: 'Common' }
        ];

        let state = { you: [], them: [] };
        let currentActiveSide = '';
        
        let animatedSlot = { side: null, index: null };

        function formatVal(num) { return num.toLocaleString('id-ID'); }
        
        function formatShort(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.0', '') + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1).replace('.0', '') + 'k';
            return num;
        }

        function getRarityClass(rarity) {
            switch(rarity) {
                case 'Mythical': return 'mythical-bg';
                case 'Legendary': return 'legendary-bg';
                case 'Rare': return 'rare-bg';
                case 'Uncommon': return 'uncommon-bg';
                case 'Common': return 'common-bg';
                default: return '';
            }
        }

        function init() {
            const modalList = document.getElementById('fruit-list-modal');
            modalList.innerHTML = ''; 

            fruitData.forEach(fruit => {
                const btn = document.createElement('div');
                btn.className = `slot slot-filled ${getRarityClass(fruit.rarity)}`;
                
                btn.onclick = function() { selectFruitWithAnim(fruit, this); };
                
                btn.innerHTML = `
                    <div class="card-header" title="${fruit.name}">${fruit.name}</div>
                    <div class="card-body">
                        <img src="${fruit.img}" alt="${fruit.name}" loading="lazy" class="fruit-img">
                    </div>
                    <div class="card-footer">${formatShort(fruit.price)}</div>
                `;
                modalList.appendChild(btn);
            });
            updateUI();
        }

        function openModal(side) {
            currentActiveSide = side;
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
            requestAnimationFrame(() => {
                modal.classList.add('show');
            });
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('show');
            // Timeout disesuaikan dengan transisi CSS modal
            setTimeout(() => { modal.style.display = 'none'; }, 150); 
        }
        
        function closeModalOnOutsideClick(e) {
            if(e.target.id === 'modal') closeModal();
        }

        // FUNGSI PILIH BUAH
        function selectFruitWithAnim(fruit, element) {
            if (element.classList.contains('animate-pop-out')) return; 
            
            if (state[currentActiveSide].length < 4) {
                element.classList.add('animate-pop-out');
                
                // REVISI: Dipercepat menjadi 80ms
                setTimeout(() => {
                    animatedSlot = { side: currentActiveSide, index: state[currentActiveSide].length };
                    
                    state[currentActiveSide].push(fruit);
                    updateUI(); 
                    
                    if (state[currentActiveSide].length === 4) closeModal();
                    
                    element.classList.remove('animate-pop-out');
                }, 80);
            } else {
                alert("Maksimal 4 buah dalam 1 meja!");
            }
        }

        // FUNGSI HAPUS BUAH
        function removeFruitWithAnim(side, fruitObj, element) {
            element.classList.remove('animate-pop-in');
            element.classList.add('animate-pop-out');
            
            // REVISI: Dipercepat menjadi 80ms
            setTimeout(() => {
                const idx = state[side].indexOf(fruitObj);
                if (idx > -1) {
                    state[side].splice(idx, 1);
                    updateUI();
                }
            }, 80);
        }

        function resetAll() {
            state.you = []; state.them = [];
            updateUI();
        }

        function renderSlots(side) {
            const gridEl = document.getElementById(`${side}-grid`);
            gridEl.innerHTML = ''; 
            let totalBeli = 0;

            for (let i = 0; i < 4; i++) {
                const slotDiv = document.createElement('div');
                
                if (i < state[side].length) {
                    const fruit = state[side][i];
                    totalBeli += fruit.price;
                    slotDiv.className = `slot slot-filled ${getRarityClass(fruit.rarity)}`;
                    
                    slotDiv.onclick = function() { removeFruitWithAnim(side, fruit, this); }; 
                    
                    slotDiv.innerHTML = `
                        <div class="card-header">${fruit.name}</div>
                        <div class="card-body">
                            <img src="${fruit.img}" alt="${fruit.name}" class="fruit-img">
                        </div>
                        <div class="card-footer">${formatShort(fruit.price)}</div>
                    `;

                    if (animatedSlot.side === side && animatedSlot.index === i) {
                        slotDiv.classList.add('animate-pop-in');
                    }

                } else if (i === state[side].length) {
                    slotDiv.className = `slot slot-empty`;
                    slotDiv.onclick = () => openModal(side); 
                    slotDiv.innerHTML = `<span class="slot-plus">+</span>`;
                } else {
                    slotDiv.className = `slot slot-disabled`;
                    slotDiv.innerHTML = ``;
                }
                gridEl.appendChild(slotDiv);
            }

            document.getElementById(`${side}-total-price`).innerHTML = `
                <span style="color: var(--text-muted);">Total Value:</span> 
                <span style="color: var(--accent);">$${formatVal(totalBeli)}</span>
            `;
            return totalBeli;
        }

        function updateUI() {
            let totalYou = renderSlots('you');
            let totalThem = renderSlots('them');
            calculateStatus(totalYou, totalThem);
            
            animatedSlot = { side: null, index: null };
        }

        function calculateStatus(you, them) {
            const uiPercent = document.getElementById('ui-percent');
            const uiStatus = document.getElementById('ui-status');
            const uiMissing = document.getElementById('ui-missing-info');

            if (you === 0 && them === 0) {
                uiPercent.innerText = "0%";
                uiPercent.className = "diff-percent text-green";
                uiStatus.innerText = "";
                uiMissing.style.display = 'none';
                return;
            }

            let max = Math.max(you, them);
            let min = Math.min(you, them);
            
            let diffValue = max - min;
            let diffPercent = (diffValue / max) * 100;

            uiPercent.innerText = Math.round(diffPercent) + "%";

            if (min >= (max * 0.6)) {
                uiPercent.classList.remove('text-red');
                uiPercent.classList.add('text-green');
                uiStatus.innerText = "TRADE FAIR"; 
                uiMissing.style.display = 'none'; 
            } else {
                uiPercent.classList.remove('text-green');
                uiPercent.classList.add('text-red');
                uiStatus.innerText = "INVALID";
                
                let requiredBeli = max * 0.6;
                let shortfall = requiredBeli - min;
                let whoNeedsMore = (you < them) ? "You" : "Them";
                
                uiMissing.innerHTML = `${whoNeedsMore} Need Adds:<br><span>$${formatVal(shortfall)}</span>`;
                uiMissing.style.display = 'block'; 
            }
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
